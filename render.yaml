services:
  - type: web
    name: sportsspo-ai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://sportsspo-ai.vercel.app,https://frontend-three-brown-74.vercel.app
    healthCheckPath: /api/health
