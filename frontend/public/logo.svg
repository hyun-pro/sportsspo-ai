<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="40" rx="10" fill="url(#shine)"/>
  <!-- Chart bars (analytics feel) -->
  <rect x="8" y="22" width="4" height="10" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="14" y="16" width="4" height="16" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="20" y="12" width="4" height="20" rx="1" fill="rgba(255,255,255,0.7)"/>
  <rect x="26" y="8" width="4" height="24" rx="1" fill="#fff"/>
  <!-- Trend line -->
  <polyline points="10,21 16,15 22,11 28,7" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="28" cy="7" r="2" fill="#10b981"/>
  <!-- Crosshair dot -->
  <circle cx="28" cy="7" r="4" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.5"/>
</svg>
